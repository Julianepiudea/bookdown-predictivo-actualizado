bookdown::gitbook:
  css: style.css
  split_by: chapter
  config:
    toc:
      collapse: subsection
      before: |
        <li><a href="./">Modelado predictivo en salud</a></li>
      after: |
        <li><em>Construido con bookdown</em></li>
    download: ["pdf", "epub"]
    search: yes

bookdown::bs4_book:
  css: style.css
  theme:
    primary: "#0d6efd"
  repo: null
